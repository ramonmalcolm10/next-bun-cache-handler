name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  package:
    name: Package (test • typecheck • build)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Test (incl. Redis integration)
        run: bun test
      - name: Typecheck
        run: bun run typecheck
      - name: Build
        run: bun run build

  example:
    name: Example smoke (Next.js ${{ matrix.label }})
    runs-on: ubuntu-latest
    needs: package
    # A break against canary should warn, not fail the whole run.
    continue-on-error: ${{ matrix.allow-failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 16.0.0 = core floor. The example gates the image config (16.2.0+) by
          # Next version, so the "use cache" path is still exercised here.
          - label: "16.0.0 (floor)"
            next: "16.0.0"
            react: "19.2.0"
            allow-failure: false
          - label: "16.2.9 (verified)"
            next: "16.2.9"
            react: "19.2.0"
            allow-failure: false
          - label: "latest"
            next: "latest"
            react: "latest"
            allow-failure: false
          - label: "canary"
            next: "canary"
            react: "canary"
            allow-failure: true
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379
      PORT: "3000"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build the package
        run: |
          bun install
          bun run build

      - name: Install example with Next.js ${{ matrix.next }}
        working-directory: examples
        run: |
          # Pin versions in package.json then do a CLEAN install. An incremental
          # `bun add` over the self-referential `file:..` dependency can hit a
          # flaky ENOENT cache-copy error, so avoid it here.
          node -e "const p=require('./package.json');p.dependencies.next='${{ matrix.next }}';p.dependencies.react='${{ matrix.react }}';p.dependencies['react-dom']='${{ matrix.react }}';require('fs').writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n')"
          rm -rf node_modules bun.lock
          bun install
          echo "Using Next.js: $(node -p "require('next/package.json').version")"

      - name: Build example (validates types + compilation)
        working-directory: examples
        run: bun --bun next build

      - name: Smoke test (dev server + assert cache hits serve 200)
        working-directory: examples
        run: |
          # Dev mode invokes the handler's get/set on every request, so it
          # exercises the cache HIT path. (Production serves this page as a
          # static prerender and would not re-read the cache per request.)
          bun --bun next dev &
          SERVER_PID=$!
          trap "kill $SERVER_PID 2>/dev/null || true" EXIT

          # Wait for the server to come up.
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || true)
            [ "$code" = "200" ] && break
            sleep 1
          done

          # First request fills the cache; the next two are cache HITS — the
          # path that previously regressed ("Connection closed"). All must be 200.
          fail=0
          for n in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || true)
            echo "request $n -> $code"
            [ "$code" = "200" ] || fail=1
          done
          exit $fail
