name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Set version from release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version

      - name: Publish
        run: npm publish --provenance --access public
        env:
          # FIRST RELEASE ONLY: authenticate with an automation token.
          # The package doesn't exist on npm yet, so npm Trusted Publishing (OIDC)
          # can't be configured for it until after the first publish.
          #
          # After this first release:
          #   1. On npmjs.com, enable Trusted Publishing for this package, linked
          #      to this repo + workflow (.github/workflows/publish.yml).
          #   2. Delete this `env:` block (and the NPM_TOKEN secret) so publishing
          #      uses identity (OIDC) — matching next-bun-compile's tokenless setup.
          #
          # `--provenance` works with either auth method (it signs via id-token).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
